function PolicyPanel({ sec, pol, setPol, ud, isAdmin, config, setConfig }) {
  const [ex, setEx] = useState({});
  const [openOther, setOpenOther] = useState({});
  const [editing, setEditing] = useState({});
  const ce = d => ud === "all" || ud === d;
  
  const getC = (key, fallback) => (config && config[key]) || fallback;
  
  const mine = sec.subs.filter(s => ce(s.dept));
  const others = sec.subs.filter(s => !ce(s.dept));
  
  const AdminEdit = ({ field, value, multiline }) => {
    const k = sec.id + "_" + field;
    if (!isAdmin) return null;
    if (editing[k]) {
      return (
        <div style={{ marginTop: 6 }}>
          {multiline ? (
            <textarea value={getC(k, value)} rows={4} onChange={e => setConfig(k, e.target.value)}
              style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: `1px solid ${T.g200}`, fontSize: 13, lineHeight: 1.7, color: T.g800, resize: "vertical" }} />
          ) : (
            <input type="text" value={getC(k, value)} onChange={e => setConfig(k, e.target.value)}
              style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: `1px solid ${T.g200}`, fontSize: 13, color: T.g800 }} />
          )}
          <button onClick={() => setEditing(p => ({...p, [k]: false}))}
            style={{ marginTop: 4, fontSize: 11, fontWeight: 500, color: T.g500, background: "none", border: `1px solid ${T.g200}`, padding: "3px 10px", borderRadius: 4, cursor: "pointer" }}>닫기</button>
        </div>
      );
    }
    return (
      <button onClick={() => setEditing(p => ({...p, [k]: true}))}
        style={{ marginLeft: 6, fontSize: 11, color: T.g400, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>수정</button>
    );
  };

  const renderItem = (s, isMine) => {
    const d = DEPTS[s.dept]; const ok = isMine; const v = pol[sec.id+"_"+s.id];
    const done = s.type === "text" ? (v && v.length > 10) : (v && v.length > 0 && Object.values(v[0]||{}).some(x => x));
    const guideKey = sec.id + "_" + s.id + "_guide";
    const exKey = sec.id + "_" + s.id + "_example";
    const titleKey = sec.id + "_" + s.id + "_title";
    const curGuide = getC(guideKey, s.guide);
    const curExample = getC(exKey, s.example);
    const curTitle = getC(titleKey, s.title);
    return (
      <div key={s.id} style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.g200}`, overflow: "hidden", borderLeft: isMine ? `3px solid ${T.g900}` : "1px solid " + T.g200, opacity: isMine ? 1 : 0.55 }}>
        <div style={{ padding: "16px 24px", borderBottom: `1px solid ${T.g100}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {isMine && ud !== "all" && <span style={{ fontSize: 11, fontWeight: 600, color: T.g900, background: T.g100, padding: "2px 8px", borderRadius: 4 }}>내 담당</span>}
            {s.critical && <span style={{ fontSize: 11, fontWeight: 600, color: T.rose }}>필수</span>}
            <span style={{ fontSize: 14, fontWeight: 600, color: T.g800 }}>{curTitle}</span>
            <AdminEdit field={s.id + "_title"} value={s.title} multiline={false} />

              <td style={{ padding:"12px 14px", textAlign:"right", fontWeight:700, color:T.g900, fontSize:15, fontFeatureSettings:"'tnum'" }}>{sum.toFixed(3)}</td>
            </tr></tbody>

        </div>

    {myGroups.length > 0 ? (
      myGroups.map(g => <Tbl key={g.dk} {...g} />)

      <div style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.g200}`, padding: "40px 24px", textAlign: "center", marginBottom: 24 }}>

              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>

                <span style={{ fontSize: 12, color: T.g400 }}>{DEPTS[g.dk].name}</span>

              <div style={{ background: T.white, borderRadius: 10, border: `1px solid ${T.g200}`, overflow: "hidden" }}>

function Scope3P({ data, set, ud }) {
  const ce = d => ud==="all"||ud===d;

  const rows = S3.map(c => ({...c, cost:data[c.id]||0, em:c.id==="c7"?212.5:(data[c.id]||0)*(c.ef||0)}));

    {myRows.length > 0 && (
      <div style={{ background:T.white, borderRadius:12, border:`1px solid ${T.g200}`, overflow:"hidden", marginBottom: 16 }}>

          <thead><tr style={{ borderBottom:`1px solid ${T.g200}` }}>
            {["카테고리","항목","담당","지출 (백만원)","배출계수","배출량 (tCO₂eq)"].map(h =>

          <tbody>{myRows.map((r,i) => <RenderRow key={r.id} r={r} i={i} last={i===myRows.length-1} editable={true}/>)}</tbody>
        </table>
      </div>

    {myRows.length === 0 && ud !== "all" && (
      <div style={{ background: T.white, borderRadius: 12, border: `1px solid ${T.g200}`, padding: "40px 24px", textAlign: "center", marginBottom: 16 }}>

          <div style={{ background:T.white, borderRadius:10, border:`1px solid ${T.g200}`, overflow:"hidden", marginTop: 4, opacity: 0.5 }}>

      <span style={{ fontSize:14, fontWeight:600, color:T.g500 }}>Scope 3 합계</span>
      <span style={{ fontSize:20, fontWeight:700, color:T.g900, fontFeatureSettings:"'tnum'" }}>{tot.toFixed(1)} <span style={{ fontSize:13, fontWeight:400, color:T.g400 }}>tCO₂eq</span></span>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════

function Dash({ data, pol }) {
  const s1 = useMemo(()=>{let s=0,m=0;SF.forEach(f=>s+=calc(data.s1[f.id],f.ncv,f.co2,f.ch4,f.n2o).t);MF.forEach(f=>m+=calc(data.s1[f.id],f.ncv,f.co2,f.ch4,f.n2o).t);return{s,m,t:s+m};},[data.s1]);
  const s2 = useMemo(()=>{const mwh=MO.reduce((s,_,i)=>s+(data.s2[i]||0),0);return{mwh,t:mwh*EFS2};},[data.s2]);
  const s3 = useMemo(()=>{let t=0;S3.forEach(c=>t+=c.id==="c7"?212.5:(data.s3[c.id]||0)*(c.ef||0));return t;},[data.s3]);
  const g = s1.t+s2.t+s3;

  const dPct = useMemo(()=>{let f=0,t=0;SF.forEach(()=>t++);SF.forEach(x=>{if(data.s1[x.id])f++;});MF.forEach(()=>t++);MF.forEach(x=>{if(data.s1[x.id])f++;});MO.forEach((_,i)=>{t++;if(data.s2[i])f++;});S3.forEach(c=>{if(c.id!=="c7"){t++;if(data.s3[c.id])f++;}});return t?Math.round(f/t*100):0;},[data]);
  const pPct = useMemo(()=>{let t=0,d=0;GRI.forEach(s=>s.subs.forEach(sub=>{t++;const v=pol[s.id+"_"+sub.id];if(sub.type==="text"?(v&&v.length>10):(v&&v.length>0&&Object.values(v[0]||{}).some(x=>x)))d++;}));return t?Math.round(d/t*100):0;},[pol]);

  return <div>
    <div style={{ marginBottom:28 }}>
      <h2 style={{ fontSize:22, fontWeight:700, color:T.g900, letterSpacing:"-0.02em" }}>Overview</h2>
      <p style={{ fontSize:14, color:T.g500, marginTop:2 }}>2025년 온실가스 배출량 및 GRI 102 작성 현황</p>
    </div>

    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, marginBottom:16 }}>
      <KPI label="총 배출량" value={g} unit="tCO₂eq" color={T.g900}/>
      <KPI label="Scope 1" value={s1.t} unit="tCO₂eq · 직접배출" color={T.g900}/>
      <KPI label="Scope 2" value={s2.t} unit="tCO₂eq · 전력" color={T.g900}/>
      <KPI label="Scope 3" value={s3} unit="tCO₂eq · 공급망" color={T.g900}/>
    </div>

    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:16 }}>
      <div style={{ background:T.white, borderRadius:12, border:`1px solid ${T.g200}`, padding:24 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ fontSize:14, fontWeight:600, color:T.g800 }}>정량 데이터 입력</span>
          <span style={{ fontSize:24, fontWeight:700, color: T.g900, fontFeatureSettings:"'tnum'" }}>{dPct}%</span>
        </div>
        <Bar pct={dPct} color={T.g900} h={6}/>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:12 }}>
          {[["Scope 1",Math.round((SF.filter(f=>data.s1[f.id]).length+MF.filter(f=>data.s1[f.id]).length)/(SF.length+MF.length)*100)],
            ["Scope 2",Math.round(MO.filter((_,i)=>data.s2[i]).length/12*100)],
            ["Scope 3",Math.round(S3.filter(c=>c.id!=="c7"&&data.s3[c.id]).length/S3.filter(c=>c.id!=="c7").length*100)]
          ].map(([l,p])=><div key={l} style={{ textAlign:"center", flex:1 }}>
            <Bar pct={p} color={T.g400} h={3}/>
            <p style={{ fontSize:11, color:T.g400, marginTop:4 }}>{l} {p}%</p>
          </div>)}
        </div>
      </div>
      <div style={{ background:T.white, borderRadius:12, border:`1px solid ${T.g200}`, padding:24 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <span style={{ fontSize:14, fontWeight:600, color:T.g800 }}>GRI 102 정책·서술</span>
          <span style={{ fontSize:24, fontWeight:700, color: T.g900, fontFeatureSettings:"'tnum'" }}>{pPct}%</span>
        </div>
        <Bar pct={pPct} color={T.g900} h={6}/>
        <div style={{ marginTop:12 }}>
          {GRI.map(s => {
            const d = s.subs.filter(sub=>{const v=pol[s.id+"_"+sub.id];return sub.type==="text"?(v&&v.length>10):(v&&v.length>0&&Object.values(v[0]||{}).some(x=>x));}).length;
            const p = Math.round(d/s.subs.length*100);
            return <div key={s.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
              <span style={{ fontSize:12, fontWeight:500, color:T.g500, width:70 }}>{s.gri}</span>
              <div style={{ flex:1 }}><Bar pct={p} color={T.g400} h={3}/></div>
              <span style={{ fontSize:12, fontWeight:600, color:T.g500, width:50, textAlign:"right", fontFeatureSettings:"'tnum'" }}>{d}/{s.subs.length}</span>
            </div>;
          })}
        </div>
      </div>
    </div>

    <div style={{ background:T.white, borderRadius:12, border:`1px solid ${T.g200}`, padding:24 }}>
      <span style={{ fontSize:14, fontWeight:600, color:T.g800, display:"block", marginBottom:16 }}>부서별 진행 현황</span>
      {Object.entries(DEPTS).map(([k,d])=>{
        let my=0,mt=0;
        SF.filter(f=>f.dept===k).forEach(()=>mt++);SF.filter(f=>f.dept===k&&data.s1[f.id]).forEach(()=>my++);
        MF.filter(f=>f.dept===k).forEach(()=>mt++);MF.filter(f=>f.dept===k&&data.s1[f.id]).forEach(()=>my++);
        if(k==="admin")MO.forEach((_,i)=>{mt++;if(data.s2[i])my++;});
        S3.filter(c=>c.dept===k&&c.id!=="c7").forEach(c=>{mt++;if(data.s3[c.id])my++;});
        GRI.forEach(s=>s.subs.filter(sub=>sub.dept===k).forEach(sub=>{mt++;const v=pol[s.id+"_"+sub.id];if(sub.type==="text"?(v&&v.length>10):(v&&v.length>0&&Object.values(v[0]||{}).some(x=>x)))my++;}));
        if(!mt)return null;const p=Math.round(my/mt*100);
        return <div key={k} style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>
          <span style={{ fontSize:13, fontWeight:500, color:T.g600, width:100 }}>{d.name.split(" · ")[0]}</span>
          <div style={{ flex:1 }}><Bar pct={p} color={T.g400} h={4}/></div>
          <span style={{ fontSize:12, fontWeight:600, color:T.g500, width:60, textAlign:"right", fontFeatureSettings:"'tnum'" }}>{my}/{mt}</span>
        </div>;
      })}
    </div>
  </div>;
}

/* ═══════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [pg, setPg] = useState("dash");
  const [data, setData] = useState({ s1:{}, s2:{}, s3:{} });
  const [pol, setPol] = useState({});
  const [config, setConfigState] = useState({});
  const [saving, setSaving] = useState(false);
  const [loaded, setLoaded] = useState(false);

  // Supabase 연결
  const SB_URL = "https://jwveemnpjsxzpjmeuggw.supabase.co";
  const SB_KEY = "sb_publishable_fehbLAN41_B_-ArqmJbX1w_zgw4kxxg";
  
  const sbFetch = useCallback(async (path, opts = {}) => {
    const res = await fetch(SB_URL + "/rest/v1/" + path, {
      ...opts,
      headers: {
        "apikey": SB_KEY,
        "Authorization": "Bearer " + SB_KEY,
        "Content-Type": "application/json",
        "Prefer": opts.method === "PATCH" ? "return=minimal" : "return=representation",
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) return null;
    if (opts.method === "PATCH") return true;
    return res.json();
  }, []);

  // 로드
  const loadData = useCallback(async () => {
    try {
      const rows = await sbFetch("esg_data?select=category,data");
      if (rows && rows.length > 0) {
        const newData = { s1:{}, s2:{}, s3:{} };
        let newPol = {};
        rows.forEach(r => {
          if (r.category === "s1") newData.s1 = r.data || {};
          else if (r.category === "s2") newData.s2 = r.data || {};
          else if (r.category === "s3") newData.s3 = r.data || {};
          else if (r.category === "policy") newPol = r.data || {};
          else if (r.category === "config") setConfigState(r.data || {});
        });
        setData(newData);
        setPol(newPol);
      }
    } catch(e) { console.log("Load error:", e); }
    setLoaded(true);
  }, [sbFetch]);

  // 저장 (디바운스)
  const saveTimer = React.useRef(null);
  const saveData = useCallback((cat, val) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    setSaving(true);
    saveTimer.current = setTimeout(async () => {
      try {
        await sbFetch("esg_data?category=eq." + cat, {
          method: "PATCH",
          body: JSON.stringify({ data: val, updated_at: new Date().toISOString() }),
        });
      } catch(e) { console.log("Save error:", e); }
      setSaving(false);
    }, 800);
  }, [sbFetch]);

  // 초기 로드
  React.useEffect(() => { loadData(); }, [loadData]);

  const setS1 = useCallback((id,v)=>{
    setData(d=>{const n={...d,s1:{...d.s1,[id]:v}};saveData("s1",n.s1);return n;});
  },[saveData]);
  const setS2 = useCallback((i,v)=>{
    setData(d=>{const n={...d,s2:{...d.s2,[i]:v}};saveData("s2",n.s2);return n;});
  },[saveData]);
  const setS3 = useCallback((id,v)=>{
    setData(d=>{const n={...d,s3:{...d.s3,[id]:v}};saveData("s3",n.s3);return n;});
  },[saveData]);
  const setP = useCallback((id,v)=>{
    setPol(d=>{const n={...d,[id]:v};saveData("policy",n);return n;});
  },[saveData]);
  const setCfg = useCallback((id,v)=>{
    setConfigState(d=>{const n={...d,[id]:v};saveData("config",n);return n;});
  },[saveData]);

  if (!loaded) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:T.g50 }}>
      <style>{globalCSS}</style>
      <div style={{ textAlign:"center" }}>
        <p style={{ fontSize:15, fontWeight:600, color:T.g500 }}>데이터 로딩 중...</p>
      </div>
    </div>
  );

  if (!user) return <Login onLogin={u=>{setUser(u);setPg("dash");}}/>;
  const dept = DEPTS[user.dept] || { name:"관리자", color:T.g900, tag:"ALL" };

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:T.g50 }}>
      <style>{globalCSS}</style>

      {/* SAVE INDICATOR */}
      {saving && <div style={{ position:"fixed", top:12, right:12, zIndex:999, fontSize:12, fontWeight:500, color:T.g400, background:T.white, border:`1px solid ${T.g200}`, padding:"6px 14px", borderRadius:6 }}>저장 중...</div>}

      {/* SIDEBAR */}
      <div style={{ width:220, background:T.white, borderRight:`1px solid ${T.g200}`, padding:"20px 0", display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"0 20px 20px", borderBottom:`1px solid ${T.g100}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="5" fill={T.g900}/><path d="M7 8h10M7 12h7M7 16h9" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
            <div>
              <div style={{ fontSize:14, fontWeight:700, color:T.g900, letterSpacing:"-0.01em" }}>ESG Platform</div>
              <div style={{ fontSize:10, color:T.g400 }}>the4thedge.com</div>
            </div>
          </div>
        </div>

        <div style={{ flex:1, padding:"12px 10px", overflowY:"auto" }}>
          <p style={{ fontSize:10, fontWeight:700, color:T.g400, letterSpacing:"0.08em", padding:"8px 10px 4px", textTransform:"uppercase" }}>Overview</p>
          <button onClick={()=>setPg("dash")} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:"none", background:pg==="dash"?T.g100:"transparent", color:pg==="dash"?T.g900:T.g500, fontSize:13, fontWeight:pg==="dash"?600:400, textAlign:"left", cursor:"pointer", marginBottom:2 }}>Dashboard</button>

          <p style={{ fontSize:10, fontWeight:700, color:T.g400, letterSpacing:"0.08em", padding:"14px 10px 4px", textTransform:"uppercase" }}>GRI 102 정책</p>
          {GRI.map(s=><button key={s.id} onClick={()=>setPg(s.id)} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:"none", background:pg===s.id?T.g100:"transparent", color:pg===s.id?T.g900:T.g500, fontSize:13, fontWeight:pg===s.id?600:400, textAlign:"left", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:2 }}>
            <span>{s.title}</span><span style={{ fontSize:11, color:T.g400 }}>{s.gri}</span>
          </button>)}

          <p style={{ fontSize:10, fontWeight:700, color:T.g400, letterSpacing:"0.08em", padding:"14px 10px 4px", textTransform:"uppercase" }}>배출량 산정</p>
          {[["s1","Scope 1 직접배출"],["s2","Scope 2 간접배출"],["s3","Scope 3 기타"]].map(([id,l])=>
            <button key={id} onClick={()=>setPg(id)} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:"none", background:pg===id?T.g100:"transparent", color:pg===id?T.g900:T.g500, fontSize:13, fontWeight:pg===id?600:400, textAlign:"left", cursor:"pointer", marginBottom:2 }}>{l}</button>
          )}
        </div>

        <div style={{ padding:"12px 16px", borderTop:`1px solid ${T.g100}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <div style={{ width:28, height:28, borderRadius:6, background:T.g200, color:T.g600, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:600 }}>{user.name[0]}</div>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:T.g800 }}>{user.name}</div>
              <div style={{ fontSize:11, color:T.g400 }}>{dept.name}</div>
            </div>
          </div>
          <button onClick={()=>setUser(null)} style={{ width:"100%", padding:"6px", borderRadius:6, border:`1px solid ${T.g200}`, background:"none", color:T.g500, fontSize:12, cursor:"pointer" }}>로그아웃</button>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{ flex:1, padding:"32px 40px", overflowY:"auto", maxHeight:"100vh" }}>
        {pg==="dash" && <Dash data={data} pol={pol}/>}
        {GRI.map(s => pg===s.id && <PolicyPanel key={s.id} sec={s} pol={pol} setPol={setP} ud={user.dept} isAdmin={user.dept==="all"} config={config} setConfig={setCfg}/>)}
        {pg==="s1" && <Scope1P data={data.s1} set={setS1} ud={user.dept}/>}
        {pg==="s2" && <Scope2P data={data.s2} set={setS2} ud={user.dept}/>}
        {pg==="s3" && <Scope3P data={data.s3} set={setS3} ud={user.dept}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
